<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatima Gift</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.container{text-align:center}

h1{margin-bottom:20px;font-weight:600}

.gift-box{
  width:120px;
  height:120px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  border-radius:15px;
  position:relative;
  cursor:pointer;
  margin:auto;
  transition:.4s;
}

.gift-box:hover{transform:scale(1.1) rotate(3deg)}

.lid{
  position:absolute;
  top:-20px;
  width:120px;
  height:40px;
  background:#8b5cf6;
  border-radius:10px;
  transition:.5s;
}

.open .lid{
  transform:translateY(-60px) rotate(-10deg);
}

.message{
  margin-top:30px;
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
  max-width:400px;
}

.show{
  opacity:1;
  transform:translateY(0);
}

.btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* floating hearts */
.heart{
  position:absolute;
  color:#ec4899;
  animation:float 5s linear infinite;
  opacity:.6;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0)}
  100%{transform:translateY(-10vh) scale(1)}
}

</style>
</head>

<body>

<div class="container">
  <h1>لي فطوميي</h1>
  <p style="opacity:0.7; margin-bottom:15px;">من عدي ❤️</p>

  <div class="gift-box" onclick="openGift(this)">
    <div class="lid"></div>
  </div>

  <div id="msg" class="message">
    <p>
      منعرفشش شنقولل
      <br><br>
      مهم راك كيوت ومحلاك هلباا و منعرفشش
      <br><br>
      ونحبكك هلباا
    </p>

    <button class="btn" onclick="nextMessage()">رسالة ثانية</button>
  </div>

  <div id="msg2" class="message">
    <p>
     احلى بنيه فيك يا عالمم ا
      <br>
      نحبكك
    </p>
  </div>
</div>

<script>
function openGift(el){
  el.classList.add('open');
  document.getElementById('msg').classList.add('show');
}

function nextMessage(){
  document.getElementById('msg2').classList.add('show');
}

// floating hearts generator
setInterval(()=>{
  let heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(10+Math.random()*20)+'px';
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove()},5000);
},300);
</script>

</body>
</html>
